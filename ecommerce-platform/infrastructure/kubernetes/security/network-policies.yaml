apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: ecommerce
spec:
  podSelector: {}
  policyTypes: [Ingress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-to-services
  namespace: ecommerce
spec:
  podSelector:
    matchLabels:
      role: service
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
