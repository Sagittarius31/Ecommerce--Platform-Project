version: '3.9'

services:
  postgres-user:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: users_db
      POSTGRES_USER: user_svc
      POSTGRES_PASSWORD: secret123
    ports: ["5432:5432"]
    volumes: [postgres_user_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U user_svc -d users_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-product:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: products_db
      POSTGRES_USER: product_svc
      POSTGRES_PASSWORD: secret123
    ports: ["5433:5432"]
    volumes: [postgres_product_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U product_svc -d products_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-order:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: orders_db
      POSTGRES_USER: order_svc
      POSTGRES_PASSWORD: secret123
    ports: ["5434:5432"]
    volumes: [postgres_order_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U order_svc -d orders_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-payment:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: payments_db
      POSTGRES_USER: payment_svc
      POSTGRES_PASSWORD: secret123
    ports: ["5435:5432"]
    volumes: [postgres_payment_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U payment_svc -d payments_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 5s

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    healthcheck:
      test: ["CMD","rabbitmq-diagnostics","-q","ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  user-service:
    build: { context: ./services/user-service, dockerfile: Dockerfile }
    ports: ["8081:8080"]
    environment:
      PORT: "8080"
      ENV: development
      DATABASE_URL: postgres://user_svc:secret123@postgres-user:5432/users_db?sslmode=disable
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-jwt-secret-change-in-prod
    depends_on:
      postgres-user: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped

  product-service:
    build: { context: ./services/product-service, dockerfile: Dockerfile }
    ports: ["8082:8080"]
    environment:
      PORT: "8080"
      ENV: development
      DATABASE_URL: postgres://product_svc:secret123@postgres-product:5432/products_db?sslmode=disable
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres-product: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped

  order-service:
    build: { context: ./services/order-service, dockerfile: Dockerfile }
    ports: ["8083:8080"]
    environment:
      PORT: "8080"
      ENV: development
      DATABASE_URL: postgres://order_svc:secret123@postgres-order:5432/orders_db?sslmode=disable
      RABBITMQ_URL: amqp://admin:admin123@rabbitmq:5672/
      PRODUCT_SERVICE_GRPC: product-service:9090
    depends_on:
      postgres-order: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    restart: unless-stopped

  payment-service:
    build: { context: ./services/payment-service, dockerfile: Dockerfile }
    ports: ["8084:8080"]
    environment:
      PORT: "8080"
      ENV: development
      DATABASE_URL: postgres://payment_svc:secret123@postgres-payment:5432/payments_db?sslmode=disable
      RABBITMQ_URL: amqp://admin:admin123@rabbitmq:5672/
      STRIPE_SECRET_KEY: sk_test_REPLACE_ME
      STRIPE_WEBHOOK_SECRET: whsec_REPLACE_ME
    depends_on:
      postgres-payment: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    restart: unless-stopped

  notification-service:
    build: { context: ./services/notification-service, dockerfile: Dockerfile }
    ports: ["8085:8080"]
    environment:
      PORT: "8080"
      ENV: development
      RABBITMQ_URL: amqp://admin:admin123@rabbitmq:5672/
      SMTP_HOST: email-smtp.us-east-1.amazonaws.com
      SMTP_PORT: "587"
      SMTP_USER: REPLACE_ME
      SMTP_PASSWORD: REPLACE_ME
      SMTP_FROM: noreply@yourdomain.com
    depends_on:
      rabbitmq: { condition: service_healthy }
    restart: unless-stopped

  api-gateway:
    build: { context: ./services/api-gateway, dockerfile: Dockerfile }
    ports: ["8080:8080"]
    environment:
      PORT: "8080"
      ENV: development
      USER_SERVICE_URL: http://user-service:8080
      PRODUCT_SERVICE_URL: http://product-service:8080
      ORDER_SERVICE_URL: http://order-service:8080
      PAYMENT_SERVICE_URL: http://payment-service:8080
      JWT_SECRET: dev-jwt-secret-change-in-prod
    depends_on:
      - user-service
      - product-service
      - order-service
      - payment-service
    restart: unless-stopped

volumes:
  postgres_user_data:
  postgres_product_data:
  postgres_order_data:
  postgres_payment_data:
