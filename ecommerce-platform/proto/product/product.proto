syntax = "proto3";
package product;
option go_package = "github.com/yourname/ecommerce/proto/product";

service ProductService {
  rpc CheckStock(CheckStockRequest) returns (CheckStockResponse);
  rpc DecrementStock(DecrementStockRequest) returns (DecrementStockResponse);
}
message CheckStockRequest    { string product_id = 1; int32 quantity = 2; }
message CheckStockResponse   { bool available = 1; int32 current_stock = 2; }
message DecrementStockRequest  { string product_id = 1; int32 quantity = 2; }
message DecrementStockResponse { bool success = 1; int32 remaining_stock = 2; }
